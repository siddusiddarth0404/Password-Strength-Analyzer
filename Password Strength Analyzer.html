<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Strength Evaluator</title>
<style>
    body {
        font-family: system-ui, -apple-system, sans-serif;
        background-color: #f4f4f9;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }
    .container {
        background: white;
        padding: 2rem;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        width: 100%;
        max-width: 400px;
    }
    h2 {
        margin-top: 0;
        color: #333;
    }
    .input-group {
        position: relative;
        margin-bottom: 1rem;
    }
    input[type="password"], input[type="text"] {
        width: 100%;
        padding: 10px;
        padding-right: 40px;
        border: 1px solid #ccc;
        border-radius: 4px;
        box-sizing: border-box;
        font-size: 16px;
    }
    .toggle-btn {
        position: absolute;
        right: 10px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        cursor: pointer;
        color: #666;
    }
    .meter-container {
        height: 8px;
        background: #eee;
        border-radius: 4px;
        margin-bottom: 10px;
        overflow: hidden;
    }
    .meter-bar {
        height: 100%;
        width: 0%;
        transition: width 0.3s ease, background-color 0.3s ease;
    }
    .strength-text {
        font-weight: bold;
        margin-bottom: 1rem;
        display: block;
    }
    .checklist {
        list-style: none;
        padding: 0;
        margin: 0 0 1rem 0;
        font-size: 14px;
        color: #666;
    }
    .checklist li::before {
        content: '✗ ';
        color: #dc3545;
    }
    .checklist li.valid::before {
        content: '✓ ';
        color: #28a745;
    }
    .checklist li.valid {
        color: #333;
    }
    button.generate-btn {
        width: 100%;
        padding: 10px;
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 16px;
    }
    button.generate-btn:hover {
        background-color: #0056b3;
    }
    .warning {
        color: #dc3545;
        font-size: 14px;
        font-weight: bold;
        margin-bottom: 1rem;
        display: none;
    }
</style>
</head>
<body>

<div class="container">
    <h2>Password Evaluator</h2>
    
    <div class="input-group">
        <input type="password" id="password" placeholder="Enter your password">
        <button class="toggle-btn" id="toggleVisibility" title="Show/Hide Password">👁️</button>
    </div>

    <div class="meter-container">
        <div class="meter-bar" id="meter"></div>
    </div>
    
    <span class="strength-text" id="strengthText">Strength: None</span>
    <div class="warning" id="compromisedWarning">⚠️ This password is commonly used/compromised!</div>

    <ul class="checklist">
        <li id="req-length">At least 12 characters</li>
        <li id="req-upper">Contains uppercase letters</li>
        <li id="req-lower">Contains lowercase letters</li>
        <li id="req-number">Contains numbers</li>
        <li id="req-special">Contains symbols (@$!%*?&)</li>
    </ul>

    <button class="generate-btn" id="generateBtn">Generate Strong Password</button>
</div>

<script>
    const passwordInput = document.getElementById('password');
    const toggleBtn = document.getElementById('toggleVisibility');
    const meter = document.getElementById('meter');
    const strengthText = document.getElementById('strengthText');
    const compromisedWarning = document.getElementById('compromisedWarning');
    const generateBtn = document.getElementById('generateBtn');

    // Requirements elements
    const reqLength = document.getElementById('req-length');
    const reqUpper = document.getElementById('req-upper');
    const reqLower = document.getElementById('req-lower');
    const reqNumber = document.getElementById('req-number');
    const reqSpecial = document.getElementById('req-special');

    // Simulated database of compromised/common passwords
    const compromisedPasswords = ['password', '123456', '123456789', 'qwerty', 'admin', 'welcome', 'password123'];

    // Toggle password visibility
    toggleBtn.addEventListener('click', () => {
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
    });

    // Evaluate strength on input
    passwordInput.addEventListener('input', () => {
        const val = passwordInput.value;
        let score = 0;

        // Reset
        compromisedWarning.style.display = 'none';

        // Check criteria and update checklist
        if (val.length >= 12) { reqLength.classList.add('valid'); score++; } else { reqLength.classList.remove('valid'); }
        if (/[A-Z]/.test(val)) { reqUpper.classList.add('valid'); score++; } else { reqUpper.classList.remove('valid'); }
        if (/[a-z]/.test(val)) { reqLower.classList.add('valid'); score++; } else { reqLower.classList.remove('valid'); }
        if (/[0-9]/.test(val)) { reqNumber.classList.add('valid'); score++; } else { reqNumber.classList.remove('valid'); }
        if (/[^A-Za-z0-9]/.test(val)) { reqSpecial.classList.add('valid'); score++; } else { reqSpecial.classList.remove('valid'); }

        // Extra points for longer passwords
        if (val.length >= 16) score++; 

        // Simulated DB Check for reused/compromised passwords
        if (compromisedPasswords.includes(val.toLowerCase())) {
            score = 0; // Drop score to minimum
            compromisedWarning.style.display = 'block';
        }

        updateMeter(score, val.length);
    });

    function updateMeter(score, length) {
        if (length === 0) {
            meter.style.width = '0%';
            strengthText.textContent = 'Strength: None';
            strengthText.style.color = '#333';
            return;
        }

        switch(score) {
            case 0:
            case 1:
            case 2:
                meter.style.width = '25%';
                meter.style.backgroundColor = '#dc3545'; // Red
                strengthText.textContent = 'Strength: Weak';
                strengthText.style.color = '#dc3545';
                break;
            case 3:
            case 4:
                meter.style.width = '50%';
                meter.style.backgroundColor = '#ffc107'; // Yellow
                strengthText.textContent = 'Strength: Moderate';
                strengthText.style.color = '#d39e00';
                break;
            case 5:
                meter.style.width = '75%';
                meter.style.backgroundColor = '#28a745'; // Green
                strengthText.textContent = 'Strength: Strong';
                strengthText.style.color = '#28a745';
                break;
            case 6:
                meter.style.width = '100%';
                meter.style.backgroundColor = '#155724'; // Dark Green
                strengthText.textContent = 'Strength: Very Strong';
                strengthText.style.color = '#155724';
                break;
        }
    }

    // Generate strong password
    generateBtn.addEventListener('click', () => {
        const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()_+~`|}{[]:;?><,./-=";
        let newPassword = "";
        
        // Ensure at least one of each required type
        newPassword += "ABCDEFGHIJKLMNOPQRSTUVWXYZ"[Math.floor(Math.random() * 26)];
        newPassword += "abcdefghijklmnopqrstuvwxyz"[Math.floor(Math.random() * 26)];
        newPassword += "0123456789"[Math.floor(Math.random() * 10)];
        newPassword += "!@#$%^&*"[Math.floor(Math.random() * 8)];

        // Fill the rest to reach 16 characters
        for (let i = 4; i < 16; i++) {
            newPassword += chars.charAt(Math.floor(Math.random() * chars.length));
        }

        // Shuffle the string so the predictable pattern isn't at the beginning
        newPassword = newPassword.split('').sort(() => 0.5 - Math.random()).join('');

        passwordInput.value = newPassword;
        passwordInput.setAttribute('type', 'text'); // Briefly show the generated password
        
        // Trigger input event to update meter
        passwordInput.dispatchEvent(new Event('input'));
    });
</script>
</body>
</html>
